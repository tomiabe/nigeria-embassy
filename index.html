<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nigeria Embassy &amp; Consular Finder</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f1110'/%3E%3Ccircle cx='32' cy='32' r='20' fill='%2392b39a'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="Find embassies, consulates, and visa processing for Nigeria. A verified directory of foreign missions in Nigeria, including where to apply when a country has no mission here."
    />
    <link rel="canonical" href="https://nigeriaembassy.vercel.app/" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nigeriaembassy.vercel.app/" />
    <meta property="og:title" content="Nigeria Embassy &amp; Consular Finder" />
    <meta
      property="og:description"
      content="Find foreign embassies, consulates, and visa application centers located in Nigeria. Find Nigerian embassies, high commissions, and consulates located around the world."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nigeria Embassy &amp; Consular Finder" />
    <meta
      name="twitter:description"
      content="Find foreign embassies, consulates, and visa application centers located in Nigeria. Find Nigerian embassies, high commissions, and consulates located around the world."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Nigeria Embassy & Consular Finder",
        "url": "https://nigeriaembassy.vercel.app/",
        "description": "Find foreign embassies, consulates, and visa application centers located in Nigeria. Find Nigerian embassies, high commissions, and consulates located around the world.",
        "publisher": {
          "@type": "Organization",
          "name": "Tomi Abe Studio",
          "url": "https://studio.tomiabe.com"
        }
      }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2SR8VG8PDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-2SR8VG8PDP");
    </script>
  </head>
  <body class="min-h-screen bg-[#f5f5f5] text-gray-900 font-sans selection:bg-blue-100">
    <header class="bg-white border-b border-gray-200 relative z-10">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-4">
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-gray-900 mb-2 leading-tight">
          Nigeria Embassy &amp; Consular Finder
        </h1>
        <p id="headerDescription" class="text-gray-600 max-w-2xl text-sm sm:text-base leading-relaxed mb-6">
          Find foreign embassies, consulates, and visa application centers located in Nigeria.
        </p>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div id="inlineSearchFilterAnchor"></div>
      <section id="searchFilterSection" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 sm:p-6 mb-8 transition-all">
        <div class="flex flex-col space-y-5">
          <!-- Toggle extracted from header -->
          <div class="flex w-full">
            <div class="inline-flex bg-gray-100 p-1 rounded-xl w-full sm:w-auto shadow-sm border border-gray-200/50">
              <button id="viewForeign" class="flex-1 sm:flex-none px-3 sm:px-6 py-2.5 text-xs sm:text-sm font-semibold rounded-lg transition-all duration-200 bg-white text-gray-900 shadow-sm border border-gray-200/50">
                <span class="hidden sm:inline">Foreign Missions in Nigeria</span>
                <span class="sm:hidden">Foreign in Nigeria</span>
              </button>
              <button id="viewNigerian" class="flex-1 sm:flex-none px-3 sm:px-6 py-2.5 text-xs sm:text-sm font-medium rounded-lg transition-all duration-200 text-gray-500 hover:text-gray-900 hover:bg-white/50">
                <span class="hidden sm:inline">Nigerian Missions Abroad</span>
                <span class="sm:hidden">Nigerian Abroad</span>
              </button>
            </div>
          </div>

          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </div>
            <input
              id="searchInput"
              type="text"
              class="block w-full pl-10 pr-20 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-shadow"
              placeholder="Search by country, city, address, or visa center..."
            />
            <button
              id="clearSearch"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm text-gray-400 hover:text-gray-600"
              type="button"
            >
              Clear
            </button>
          </div>

          <div class="flex flex-col sm:flex-row gap-6 sm:gap-4 overflow-hidden">
            <div class="flex-1 min-w-0">
              <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Mission Type</h3>
              <div id="missionFilters" class="flex overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0 sm:pb-0 sm:flex-wrap gap-2 scrollbar-hide"></div>
            </div>

            <div class="flex-1 min-w-0">
              <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Region</h3>
              <div id="regionFilters" class="flex overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0 sm:pb-0 sm:flex-wrap gap-2 scrollbar-hide"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
        <h2 class="text-lg font-semibold text-gray-900">
          Directory <span id="resultCount" class="text-gray-500 font-normal text-sm ml-2">0 countries</span>
        </h2>
        <div class="text-sm text-gray-500 flex items-center">
          <svg class="w-4 h-4 mr-1.5 text-green-600 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 12l2 2 4-4"></path>
            <circle cx="12" cy="12" r="10"></circle>
          </svg>
          Updated <span id="lastUpdated" class="ml-1">—</span>
        </div>
      </section>

      <section id="cards" class="space-y-6"></section>

      <footer class="mt-16 pt-8 border-t border-gray-200 text-center pb-12">
        <p class="text-gray-500 text-sm">
          Made by <a href="https://studio.tomiabe.com" target="_blank" rel="noreferrer" class="font-medium text-gray-900 hover:text-gray-700">Tomi Abe Studio</a>
        </p>
      </footer>
    </main>

    <button
      id="scrollTop"
      type="button"
      aria-label="Scroll to top"
      class="fixed bottom-10 right-6 z-20 hidden items-center justify-center h-11 w-11 rounded-full bg-gray-900 text-white shadow-lg shadow-gray-900/20 transition hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:ring-offset-2 focus:ring-offset-white"
    >
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m5 15 7-7 7 7"></path>
      </svg>
    </button>

    
    <!-- Floating Action Button for Search/Filters -->
    <button
      id="searchFilterFab"
      type="button"
      class="fixed bottom-28 right-6 z-40 hidden items-center justify-center gap-2 px-5 py-3.5 rounded-full bg-blue-600 text-white shadow-xl shadow-blue-600/30 transition hover:bg-blue-700 hover:scale-105 active:scale-95 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 font-medium text-sm"
    >
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      Search & Filters
    </button>

    <!-- Fullscreen Modal -->
    <div id="searchFilterModal" class="fixed inset-0 z-50 hidden flex-col justify-end sm:justify-center items-center p-0 sm:p-4">
      <div id="searchFilterBackdrop" class="absolute inset-0 bg-gray-900/50 backdrop-blur-sm transition-opacity opacity-0"></div>
      
      <!-- Modal Content Wrapper -->
      <div id="searchFilterModalPanel" class="relative w-full max-w-2xl bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl transform transition-all translate-y-full sm:translate-y-8 opacity-0 flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100">
          <h3 class="text-xl font-bold text-gray-900">Search & Filters</h3>
          <button id="closeSearchFilterModal" class="p-2 -mr-2 text-gray-400 hover:text-gray-900 hover:bg-gray-100 rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        
        <!-- Insertion point for teleported content -->
        <div id="modalSearchFilterAnchor" class="p-6 overflow-y-auto w-full"></div>
        
        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 rounded-b-none sm:rounded-b-2xl">
          <button id="applySearchFilters" class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold text-base shadow-lg shadow-gray-900/20 hover:bg-gray-800 transition-all">Show Results</button>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
